<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Antigravity</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #0f0f17);
    --bg2: var(--tg-theme-secondary-bg-color, #17171f);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8a8a99);
    --accent: var(--tg-theme-button-color, #00d2c6);
    --accent-text: var(--tg-theme-button-text-color, #04141a);
    --link: var(--tg-theme-link-color, #4fc3f7);
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh;
    font-size: 15px; line-height: 1.5;
  }
  /* Header */
  .hdr {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; background: var(--bg2);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .hdr .ava {
    width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
    background: linear-gradient(135deg, #00d2c6, #7b61ff);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #fff; font-size: 16px;
  }
  .hdr .meta { flex: 1; min-width: 0; }
  .hdr .title { font-weight: 700; font-size: 15px; }
  .hdr .sub { font-size: 11.5px; color: var(--hint); display: flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #ff5252; display: inline-block; }
  .dot.on { background: #34d399; box-shadow: 0 0 6px #34d399; }
  .hdr .modelpill {
    font-size: 11px; color: var(--hint); background: var(--bg);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 4px 9px; max-width: 130px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .launchbtn {
    font-size: 11px; font-weight: 600; color: #fff;
    background: var(--accent, #2ea6ff); border: none; border-radius: 20px;
    padding: 5px 11px; white-space: nowrap; cursor: pointer;
  }
  .launchbtn:disabled { opacity: .6; }
  /* Messages */
  .msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
  .row { display: flex; gap: 9px; max-width: 100%; animation: fade 0.2s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .row .av { width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .row.user { flex-direction: row-reverse; }
  .row.user .av { background: var(--accent); }
  .row.bot .av { background: linear-gradient(135deg, #00d2c6, #7b61ff); }
  .bubble {
    padding: 9px 12px; border-radius: 14px; max-width: 80%;
    word-wrap: break-word; overflow-wrap: anywhere;
  }
  .row.user .bubble { background: var(--accent); color: var(--accent-text); border-bottom-right-radius: 4px; }
  .row.bot .bubble { background: var(--bg2); border-bottom-left-radius: 4px; }
  .bubble .who { font-size: 10.5px; color: var(--hint); margin-bottom: 2px; font-weight: 600; }
  .row.user .bubble .who { display: none; }
  .bubble p { margin: 0 0 8px; } .bubble p:last-child { margin: 0; }
  .bubble pre { background: rgba(0,0,0,0.35); padding: 9px; border-radius: 9px; overflow-x: auto; font-size: 12.5px; margin: 6px 0; }
  .bubble code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12.5px; }
  .bubble :not(pre) > code { background: rgba(0,0,0,0.3); padding: 1px 5px; border-radius: 5px; }
  .bubble a { color: var(--link); }
  .bubble img { max-width: 100%; border-radius: 10px; margin-top: 6px; }
  .bubble .attach { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .bubble .attach img { max-width: 130px; max-height: 130px; margin: 0; }
  .typing span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--hint); margin: 0 1.5px; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; } .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; } }
  .empty { margin: auto; text-align: center; color: var(--hint); padding: 30px; }
  .empty .ico { font-size: 44px; display: block; margin-bottom: 10px; }
  /* Options */
  .opts { padding: 0 14px 6px; display: flex; flex-direction: column; gap: 6px; }
  .opt { text-align: left; padding: 11px 13px; background: var(--bg2); border: 1px solid var(--border); border-radius: 11px; color: var(--text); font-size: 14px; font-family: inherit; }
  .opt:active { background: var(--accent); color: var(--accent-text); }
  /* Composer */
  .composer { flex-shrink: 0; padding: 9px 11px; background: var(--bg2); border-top: 1px solid var(--border); }
  .thumbs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 7px; }
  .thumbs:empty { display: none; }
  .thumb { position: relative; width: 46px; height: 46px; border-radius: 9px; overflow: hidden; border: 1px solid var(--border); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb .x { position: absolute; top: -5px; right: -5px; width: 17px; height: 17px; border-radius: 50%; background: #ef4444; color: #fff; font-size: 11px; line-height: 17px; text-align: center; }
  .inrow { display: flex; align-items: flex-end; gap: 8px; }
  .attbtn { width: 38px; height: 38px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 20px; flex-shrink: 0; }
  textarea {
    flex: 1; resize: none; border: 1px solid var(--border); background: var(--bg);
    color: var(--text); border-radius: 12px; padding: 9px 12px;
    font-family: inherit; font-size: 15px; max-height: 120px; line-height: 1.4;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .sendbtn { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); color: var(--accent-text); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .sendbtn:disabled { opacity: 0.4; }
  .sendbtn svg { width: 19px; height: 19px; }
  button { border: none; cursor: pointer; -webkit-appearance: none; }
</style>
</head>
<body>
  <div class="hdr">
    <div class="ava">A</div>
    <div class="meta">
      <div class="title">Antigravity</div>
      <div class="sub"><span class="dot" id="cdp-dot"></span><span id="cdp-text">đang kết nối...</span></div>
    </div>
    <select class="modelpill" id="model-sel" onchange="switchModel(this.value)">
      <option>…</option>
    </select>
    <button class="launchbtn" id="launch-btn" onclick="launchIde()">▶ Khởi động IDE</button>
  </div>

  <div class="msgs" id="msgs">
    <div class="empty"><span class="ico">🔵</span>Gửi tin cho Antigravity để bắt đầu</div>
  </div>

  <div class="opts" id="opts"></div>

  <div class="composer">
    <div class="thumbs" id="thumbs"></div>
    <input type="file" id="file" multiple accept="image/*,video/mp4,application/pdf" style="display:none" onchange="onFiles(event)">
    <div class="inrow">
      <button class="attbtn" onclick="document.getElementById('file').click()">＋</button>
      <textarea id="input" rows="1" placeholder="Nhắn cho Antigravity..." oninput="grow(this)"></textarea>
      <button class="sendbtn" id="send" onclick="send()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const API = location.origin;

// ---- API auth token: read from ?token= (persist), attach to every /api/ call ----
const SYNAPZ_TOKEN = (function(){
  try {
    const u = new URL(location.href);
    let t = u.searchParams.get('token');
    if (t) { localStorage.setItem('synapz_token', t); return t; }
    return localStorage.getItem('synapz_token') || '';
  } catch(e){ return ''; }
})();
// Wrap fetch so API requests carry the token header automatically.
const _origFetch = window.fetch.bind(window);
window.fetch = function(url, opts){
  opts = opts || {};
  try {
    const u = String(url);
    if (SYNAPZ_TOKEN && u.indexOf('/api/') !== -1) {
      opts.headers = Object.assign({}, opts.headers, { 'X-Synapz-Token': SYNAPZ_TOKEN });
    }
  } catch(e){}
  return _origFetch(url, opts);
};

let selected = [];        // {name, dataUrl, mime}
let lastHistJson = '';
let lastOptsJson = '';
let loading = false;

function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function cleanUser(t){
  t = (t||'').replace(/<USER_REQUEST>/g,'').replace(/<\/USER_REQUEST>/g,'');
  t = t.replace(/<ADDITIONAL_METADATA>[\s\S]*?<\/ADDITIONAL_METADATA>/g,'');
  t = t.replace(/<USER_SETTINGS_CHANGE>[\s\S]*?<\/USER_SETTINGS_CHANGE>/g,'');
  t = t.replace(/<\/?[A-Z_]{3,}>/g,'');
  return t.trim();
}
function grow(el){
  el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px';
  document.getElementById('send').disabled = loading || (!el.value.trim() && !selected.length);
}

function fixImg(html){
  return html.replace(/<img([^>]*?)src="([^"]+)"([^>]*)>/gi,(m,pre,src,post)=>{
    if(/^(https?:|data:|\/api\/)/i.test(src)) return m;
    return `<img${pre}src="${API}/api/ide/localfile?path=${encodeURIComponent(src)}"${post}>`;
  });
}

function buildRow(role, text, opts={}){
  const isUser = role==='user';
  const row = document.createElement('div');
  row.className = 'row '+(isUser?'user':'bot');
  const av = document.createElement('div'); av.className='av'; av.textContent = isUser?'🧑':'🔵';
  const b = document.createElement('div'); b.className='bubble';
  if(opts.loading){ b.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>'; }
  else if(isUser){
    b.innerHTML = '<div class="who">Bố</div>';
    const span = document.createElement('div'); span.textContent = cleanUser(text); b.appendChild(span);
  } else {
    b.innerHTML = '<div class="who">Antigravity</div>' + fixImg(marked.parse(text||''));
  }
  if(opts.images && opts.images.length){
    const at = document.createElement('div'); at.className='attach';
    opts.images.forEach(src=>{
      const url = /^(https?:|data:|\/api\/)/i.test(src) ? src : `${API}/api/ide/localfile?path=${encodeURIComponent(src)}`;
      const im = document.createElement('img'); im.src=url; at.appendChild(im);
    });
    b.appendChild(at);
  }
  row.appendChild(av); row.appendChild(b);
  return row;
}

async function pollChat(){
  try{
    const r = await fetch(API+'/api/ide/chat'); if(!r.ok) return;
    const d = await r.json(); if(!d.ok || !d.messages) return;
    const j = JSON.stringify(d.messages);
    if(j!==lastHistJson){
      lastHistJson = j;
      const box = document.getElementById('msgs');
      const atBottom = box.scrollHeight-box.scrollTop-box.clientHeight < 150;
      box.innerHTML = '';
      if(!d.messages.length){ box.innerHTML='<div class="empty"><span class="ico">🔵</span>Gửi tin cho Antigravity để bắt đầu</div>'; }
      else d.messages.forEach(m=> box.appendChild(buildRow(m.role, m.content, {images:m.images})));
      if(atBottom) box.scrollTop = box.scrollHeight;
    }
    await pollOpts();
  }catch(e){}
}

async function pollOpts(){
  try{
    const r = await fetch(API+'/api/ide/options'); if(!r.ok) return;
    const d = await r.json(); const box = document.getElementById('opts');
    if(!d.has_options || !(d.options||[]).length){ if(box.innerHTML){box.innerHTML='';lastOptsJson='';} return; }
    const sig = JSON.stringify(d.options.map(o=>o.text));
    if(sig===lastOptsJson) return; lastOptsJson = sig;
    box.innerHTML = d.options.map(o=>`<button class="opt" onclick="pickOpt(${o.idx})">${esc(o.text||'Tùy chọn khác…')}</button>`).join('');
  }catch(e){}
}

async function pickOpt(i){
  try{
    if(tg) tg.HapticFeedback?.impactOccurred('light');
    document.getElementById('opts').innerHTML='';
    await fetch(API+'/api/ide/select_option',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({index:i,submit:true})});
    lastOptsJson=''; setTimeout(pollChat,800);
  }catch(e){}
}

async function checkCdp(){
  try{
    const r = await fetch(API+'/api/ide/status'); const d = await r.json();
    const on = !!d.ok;
    document.getElementById('cdp-dot').className = 'dot'+(on?' on':'');
    document.getElementById('cdp-text').textContent = on ? 'CDP LIVE · 9333' : 'IDE offline';
    const btn = document.getElementById('launch-btn');
    if(btn){ btn.style.display=''; btn.textContent = on ? '↻ Khởi động lại IDE' : '▶ Khởi động IDE'; }
    return on;
  }catch(e){ document.getElementById('cdp-text').textContent='offline'; return false; }
}

async function launchIde(){
  const btn = document.getElementById('launch-btn');
  const txt = document.getElementById('cdp-text');
  const live = document.getElementById('cdp-dot').classList.contains('on');
  if(live && !confirm('IDE đang chạy. Khởi động lại Antigravity? (đóng IDE hiện tại)')) return;
  if(tg) tg.HapticFeedback?.impactOccurred?.('medium');
  if(btn){ btn.disabled = true; btn.textContent='⏳ Đang khởi động…'; }
  if(txt) txt.textContent = (live?'Đang khởi động lại':'Đang mở')+' Antigravity… (~30s)';
  try{
    const r = await fetch(API+'/api/ide/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({force:live})});
    const d = await r.json();
    if(d.ok){
      if(txt) txt.textContent = 'CDP LIVE · 9333';
      document.getElementById('cdp-dot').className = 'dot on';
      if(tg) tg.HapticFeedback?.notificationOccurred?.('success');
      loadModels();
    }else{
      if(txt) txt.textContent = 'Lỗi: '+(d.reason||'không mở được');
      if(tg) tg.HapticFeedback?.notificationOccurred?.('error');
    }
  }catch(e){ if(txt) txt.textContent='Lỗi khởi động'; }
  finally{ if(btn) btn.disabled=false; checkCdp(); }
}

async function loadModels(){
  try{
    const r = await fetch(API+'/api/ide/models'); const d = await r.json();
    const sel = document.getElementById('model-sel');
    const ms = (d.models||[]).filter(Boolean);
    if(!ms.length){ sel.innerHTML = `<option>${esc(d.current||'—')}</option>`; return; }
    sel.innerHTML = ms.map(m=>`<option${m===d.current?' selected':''}>${esc(m)}</option>`).join('');
  }catch(e){}
}
async function switchModel(name){
  try{ if(tg) tg.HapticFeedback?.selectionChanged(); await fetch(API+'/api/ide/model',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:name})}); }catch(e){}
}

function onFiles(ev){
  const files = Array.from(ev.target.files||[]);
  files.forEach(f=>{
    if(selected.length>=5) return;
    const rd = new FileReader();
    rd.onload = e=>{ selected.push({name:f.name||`f_${Date.now()}.png`, dataUrl:e.target.result, mime:f.type}); renderThumbs(); };
    rd.readAsDataURL(f);
  });
  ev.target.value='';
}
function renderThumbs(){
  document.getElementById('thumbs').innerHTML = selected.map((f,i)=>
    `<div class="thumb"><img src="${f.dataUrl}"><span class="x" onclick="rmThumb(${i})">×</span></div>`).join('');
  grow(document.getElementById('input'));
}
function rmThumb(i){ selected.splice(i,1); renderThumbs(); }

async function send(){
  const input = document.getElementById('input');
  const text = input.value.trim();
  if((!text && !selected.length) || loading) return;
  loading = true;
  document.getElementById('send').disabled = true;
  if(tg) tg.HapticFeedback?.impactOccurred('medium');

  const box = document.getElementById('msgs');
  const emptyEl = box.querySelector('.empty'); if(emptyEl) emptyEl.remove();
  const imgs = selected.map(s=>s.dataUrl);
  box.appendChild(buildRow('user', text, {images:imgs}));
  const load = buildRow('bot','',{loading:true}); box.appendChild(load);
  box.scrollTop = box.scrollHeight;
  const toSend = selected.slice(); selected=[]; renderThumbs();
  input.value=''; grow(input);

  try{
    if(toSend.length){
      await fetch(API+'/api/ide/upload',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({files:toSend.map(s=>({name:s.name,data:s.dataUrl}))})});
    }
    const r = await fetch(API+'/api/ide/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:text})});
    const d = await r.json();
    load.remove();
    if(!d.ok){ box.appendChild(buildRow('bot','❌ '+(d.reason||'Lỗi gửi'))); }
    lastHistJson='';
    await pollChat();
  }catch(e){
    load.remove();
    box.appendChild(buildRow('bot','❌ Lỗi: '+e.message));
  }finally{
    loading=false; grow(input);
    box.scrollTop = box.scrollHeight;
  }
}

document.getElementById('input').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});

// boot
checkCdp(); loadModels(); pollChat();
setInterval(pollChat, 1800);
setInterval(checkCdp, 8000);
</script>
</body>
</html>
